name: Deploy to Production

# Only deploy on push to main or manual trigger — never on PRs
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel an in-flight deploy

permissions:
  contents: read
  packages: write             # push images to GHCR

env:
  CI:         'true'
  GHCR_OWNER: claudygod-musicministries
  REGISTRY:   ghcr.io/claudygod-musicministries
  CI_DATABASE_URL:               ${{ secrets.CI_DATABASE_URL }}
  CI_SUPABASE_URL:               ${{ secrets.CI_SUPABASE_URL }}
  CI_SUPABASE_PUBLISHABLE_KEY:   ${{ secrets.CI_SUPABASE_PUBLISHABLE_KEY }}
  CI_SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
  CI_YOUTUBE_API_KEY:            ${{ secrets.CI_YOUTUBE_API_KEY }}
  CI_YOUTUBE_CHANNEL_ID:         ${{ secrets.CI_YOUTUBE_CHANNEL_ID }}
  CI_POSTFIX_SMTP_USERNAME:      ${{ secrets.CI_POSTFIX_SMTP_USERNAME }}
  CI_POSTFIX_SMTP_PASSWORD:      ${{ secrets.CI_POSTFIX_SMTP_PASSWORD }}

jobs:
  # ── 1. Quality gate — must pass before anything is built or deployed ─────────
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20 via nvm
        run: |
          . "$HOME/.nvm/nvm.sh"
          nvm install 22
          nvm use 22
          echo "$(nvm which 22 | xargs dirname)" >> "$GITHUB_PATH"

      - name: Enable Corepack and activate Yarn Classic
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Create CI environment files
        run: bash ./scripts/setup-ci-env.sh

      - name: Install API dependencies
        run: yarn --cwd ./services/api install --frozen-lockfile

      - name: Install admin dependencies
        run: yarn --cwd ./admin/web install --frozen-lockfile

      - name: Install mobile dependencies
        run: yarn --cwd ./apps/mobile install --frozen-lockfile

      - name: Run full repository review
        run: bash ./scripts/review-all.sh

  # ── 2. Build all Docker images and push to GHCR ──────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Create CI environment files
        run: bash ./scripts/setup-ci-env.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # API image (shared by api, worker, migrate containers)
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context:    ./services/api
          file:       ./services/api/Dockerfile
          platforms:  linux/amd64
          push:       true
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-api:latest
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max

      # Postfix relay
      - name: Build and push Postfix image
        uses: docker/build-push-action@v6
        with:
          context:    ./ops/postfix
          platforms:  linux/amd64
          push:       true
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-postfix:latest
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-postfix:${{ github.sha }}
          cache-from: type=gha,scope=postfix
          cache-to:   type=gha,scope=postfix,mode=max

      # Admin web — VITE vars baked in at build time (use GitHub Variables for these)
      - name: Build and push admin-web image
        uses: docker/build-push-action@v6
        with:
          context:    ./admin/web
          file:       ./admin/web/Dockerfile
          platforms:  linux/amd64
          push:       true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_GOOGLE_LOGIN_URL=${{ vars.VITE_GOOGLE_LOGIN_URL }}
            VITE_MOBILE_PREVIEW_URL=${{ vars.VITE_MOBILE_PREVIEW_URL }}
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-admin:latest
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-admin:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to:   type=gha,scope=admin,mode=max

      # Mobile web — EXPO_PUBLIC vars baked in at build time
      - name: Build and push mobile-web image
        uses: docker/build-push-action@v6
        with:
          context:    ./apps/mobile
          file:       ./apps/mobile/Dockerfile.prod
          platforms:  linux/amd64
          push:       true
          build-args: |
            EXPO_PUBLIC_API_URL=${{ vars.EXPO_PUBLIC_API_URL }}
            EXPO_PUBLIC_SUPABASE_URL=${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
            EXPO_PUBLIC_SUPABASE_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
            EXPO_PUBLIC_MOBILE_API_KEY=${{ secrets.EXPO_PUBLIC_MOBILE_API_KEY }}
            EAS_PROJECT_ID=${{ vars.EAS_PROJECT_ID }}
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-mobile:latest
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-mobile:${{ github.sha }}
          cache-from: type=gha,scope=mobile
          cache-to:   type=gha,scope=mobile,mode=max

  # ── 3. Deploy — SSH into the VPS, pull the images just built, migrate, roll out ─
  #
  # Required GitHub repo configuration (Settings → Secrets and variables → Actions):
  #   Secrets:
  #     DEPLOY_SSH_HOST        — VPS hostname or IP
  #     DEPLOY_SSH_USER        — SSH user with docker permissions on the VPS
  #     DEPLOY_SSH_KEY         — private key for that user (no passphrase)
  #     DEPLOY_SSH_PORT        — SSH port (optional, defaults to 22)
  #     DEPLOY_APP_DIR         — absolute path on the VPS holding docker-compose.production.yml
  #                              and the real .env.production (e.g. /opt/claudygod)
  #     DEPLOY_GHCR_TOKEN      — GitHub PAT with `read:packages`, used by the VPS itself
  #                              to `docker login ghcr.io` (only needed while the GHCR
  #                              packages are private)
  #   Variables:
  #     API_DOMAIN             — e.g. api.claudygod.org (for the post-deploy health check)
  #
  # This job never creates or touches .env.production on the server — that file holds
  # real production secrets and is managed by whoever operates the VPS, once, out of
  # band. `scripts/setup-ci-env.sh` (used by the `quality`/`build-push` jobs above) only
  # ever writes a CI-local file for running tests; it has no path to the server at all.
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-push
    timeout-minutes: 20
    environment:
      name: production
      url: https://${{ vars.API_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      # Sync just the compose file the server needs — never the repo, never .env.production.
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          source: "docker-compose.production.yml"
          target: ${{ secrets.DEPLOY_APP_DIR }}
          overwrite: true

      - name: Pull images, run migrations, roll out
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_APP_DIR }}"

            if [ ! -f .env.production ]; then
              echo "::error::.env.production is missing on the server at ${{ secrets.DEPLOY_APP_DIR }} — refusing to deploy without real secrets."
              exit 1
            fi

            echo "${{ secrets.DEPLOY_GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            export GHCR_OWNER="${{ env.GHCR_OWNER }}"
            export IMAGE_TAG="${{ github.sha }}"
            COMPOSE="docker compose -f docker-compose.production.yml --env-file .env.production"

            echo "── Pulling images for $IMAGE_TAG ──"
            $COMPOSE pull

            echo "── Running database migrations ──"
            $COMPOSE run --rm migrate

            echo "── Rolling out updated services ──"
            $COMPOSE up -d --remove-orphans redis postfix-relay api worker admin-web mobile-web

            echo "── Pruning images older than 48h ──"
            docker image prune -af --filter "until=48h" || true

      - name: Wait for containers to report healthy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_APP_DIR }}"
            COMPOSE="docker compose -f docker-compose.production.yml --env-file .env.production"

            for i in $(seq 1 15); do
              unhealthy=$($COMPOSE ps --format '{{.Health}}' 2>/dev/null | grep -v '^healthy$' | grep -v '^$' || true)
              if [ -z "$unhealthy" ]; then
                echo "All containers healthy."
                exit 0
              fi
              echo "Waiting for containers to become healthy ($i/15)..."
              sleep 6
            done

            echo "::error::Containers did not become healthy in time — dumping recent logs."
            $COMPOSE ps
            $COMPOSE logs --tail=100 api worker admin-web mobile-web
            exit 1

      # The internal docker healthcheck only proves the container is up — this proves
      # DNS, TLS, and Traefik are actually routing real traffic to it.
      - name: Verify public API endpoint
        run: |
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w '%{http_code}' "https://${{ vars.API_DOMAIN }}/health" || echo "000")
            if [ "$status" = "200" ]; then
              echo "API is reachable and healthy at https://${{ vars.API_DOMAIN }}/health"
              exit 0
            fi
            echo "Public health check returned $status, retrying ($i/10)..."
            sleep 6
          done
          echo "::error::API did not respond healthy at https://${{ vars.API_DOMAIN }}/health after deploy."
          exit 1
