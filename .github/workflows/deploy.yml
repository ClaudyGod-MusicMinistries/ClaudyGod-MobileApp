name: Deploy to Production

# Only deploy on push to main or manual trigger — never on PRs
on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel an in-flight deploy

permissions:
  contents: read
  packages: write             # push images to GHCR

env:
  CI:         'true'
  GHCR_OWNER: claudygod-musicministries
  REGISTRY:   ghcr.io/claudygod-musicministries
  CI_DATABASE_URL:               ${{ secrets.CI_DATABASE_URL }}
  CI_SUPABASE_URL:               ${{ secrets.CI_SUPABASE_URL }}
  CI_SUPABASE_PUBLISHABLE_KEY:   ${{ secrets.CI_SUPABASE_PUBLISHABLE_KEY }}
  CI_SUPABASE_SERVICE_ROLE_KEY:  ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
  CI_YOUTUBE_API_KEY:            ${{ secrets.CI_YOUTUBE_API_KEY }}
  CI_YOUTUBE_CHANNEL_ID:         ${{ secrets.CI_YOUTUBE_CHANNEL_ID }}
  CI_POSTFIX_SMTP_USERNAME:      ${{ secrets.CI_POSTFIX_SMTP_USERNAME }}
  CI_POSTFIX_SMTP_PASSWORD:      ${{ secrets.CI_POSTFIX_SMTP_PASSWORD }}

jobs:
  # ── 1. Quality gate — must pass before anything is built or deployed ─────────
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20 via nvm
        run: |
          . "$HOME/.nvm/nvm.sh"
          nvm install 22
          nvm use 22
          echo "$(nvm which 22 | xargs dirname)" >> "$GITHUB_PATH"

      - name: Enable Corepack and activate Yarn Classic
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Create CI environment files
        run: bash ./scripts/setup-ci-env.sh

      - name: Install API dependencies
        run: yarn --cwd ./services/api install --frozen-lockfile

      - name: Install admin dependencies
        run: yarn --cwd ./admin/web install --frozen-lockfile

      - name: Install mobile dependencies
        run: yarn --cwd ./apps/mobile install --frozen-lockfile

      - name: Run full repository review
        run: bash ./scripts/review-all.sh

  # ── 2. Build all Docker images and push to GHCR ──────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Create CI environment files
        run: bash ./scripts/setup-ci-env.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # API image (shared by api, worker, migrate containers)
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context:    ./services/api
          file:       ./services/api/Dockerfile
          platforms:  linux/amd64
          push:       true
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-api:latest
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to:   type=gha,scope=api,mode=max

      # Postfix relay
      - name: Build and push Postfix image
        uses: docker/build-push-action@v6
        with:
          context:    ./ops/postfix
          platforms:  linux/amd64
          push:       true
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-postfix:latest
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-postfix:${{ github.sha }}
          cache-from: type=gha,scope=postfix
          cache-to:   type=gha,scope=postfix,mode=max

      # Admin web — VITE vars baked in at build time (use GitHub Variables for these)
      - name: Build and push admin-web image
        uses: docker/build-push-action@v6
        with:
          context:    ./admin/web
          file:       ./admin/web/Dockerfile
          platforms:  linux/amd64
          push:       true
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_GOOGLE_LOGIN_URL=${{ vars.VITE_GOOGLE_LOGIN_URL }}
            VITE_MOBILE_PREVIEW_URL=${{ vars.VITE_MOBILE_PREVIEW_URL }}
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-admin:latest
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-admin:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to:   type=gha,scope=admin,mode=max

      # Mobile web — EXPO_PUBLIC vars baked in at build time
      - name: Build and push mobile-web image
        uses: docker/build-push-action@v6
        with:
          context:    ./apps/mobile
          file:       ./apps/mobile/Dockerfile.prod
          platforms:  linux/amd64
          push:       true
          build-args: |
            EXPO_PUBLIC_API_URL=${{ vars.EXPO_PUBLIC_API_URL }}
            EXPO_PUBLIC_SUPABASE_URL=${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
            EXPO_PUBLIC_SUPABASE_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_KEY }}
            EXPO_PUBLIC_MOBILE_API_KEY=${{ secrets.EXPO_PUBLIC_MOBILE_API_KEY }}
            EAS_PROJECT_ID=${{ vars.EAS_PROJECT_ID }}
          tags: |
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-mobile:latest
            ghcr.io/${{ env.GHCR_OWNER }}/claudygod-mobile:${{ github.sha }}
          cache-from: type=gha,scope=mobile
          cache-to:   type=gha,scope=mobile,mode=max

  # ── 3. Deploy — SSH into the VPS and run `make deploy` (pull → migrate → up --wait) ─
  #
  # This mirrors the deploy job that was already tested against production (see git
  # history: commit 630a34b onward) rather than reinventing the mechanism. The VPS holds
  # its own git clone of this repo at VPS_DEPLOY_PATH; `git pull` brings its
  # docker-compose.production.yml and Makefile up to date, then `make deploy` (defined
  # in the repo's own Makefile) does the actual pull/migrate/rollout via
  # `docker compose ... up -d --wait`, which already blocks on and fails on unhealthy
  # containers — no separate polling step needed here.
  #
  # Required GitHub repo configuration (Settings → Secrets and variables → Actions):
  #   Secrets:
  #     VPS_HOST            — VPS hostname or IP
  #     VPS_USER            — SSH user with docker + git permissions on the VPS
  #     VPS_SSH_KEY         — private key for that user, base64-encoded
  #                           (e.g. `base64 -i deploy_key | pbcopy` before pasting in)
  #     VPS_PORT            — SSH port
  #     VPS_DEPLOY_PATH     — absolute path to the repo's git clone on the VPS,
  #                           containing the real .env.production (e.g. /opt/claudygod)
  #     GHCR_DEPLOY_TOKEN   — GitHub PAT with `read:packages`, used by the VPS to
  #                           `docker login ghcr.io` (only needed while GHCR packages
  #                           are private)
  #   Variables:
  #     API_DOMAIN          — e.g. api.claudygod.org (for the post-deploy health check)
  #
  # This job never creates or touches .env.production on the server — that file holds
  # real production secrets and is managed by whoever operates the VPS, once, out of
  # band. `scripts/setup-ci-env.sh` (used by the `quality`/`build-push` jobs above) only
  # ever writes a CI-local file for running tests; it has no path to the server at all.
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-push
    timeout-minutes: 20
    environment:
      name: production
      url: https://${{ vars.API_DOMAIN }}

    steps:
      # Fail fast with a clear message if deployment isn't configured yet, instead of
      # letting missing secrets silently interpolate to "" and produce a cryptic
      # ssh failure downstream.
      - name: Verify deployment secrets are configured
        run: |
          missing=""
          [ -z "${{ secrets.VPS_HOST }}" ]          && missing="$missing VPS_HOST"
          [ -z "${{ secrets.VPS_USER }}" ]          && missing="$missing VPS_USER"
          [ -z "${{ secrets.VPS_SSH_KEY }}" ]       && missing="$missing VPS_SSH_KEY"
          [ -z "${{ secrets.VPS_PORT }}" ]          && missing="$missing VPS_PORT"
          [ -z "${{ secrets.VPS_DEPLOY_PATH }}" ]   && missing="$missing VPS_DEPLOY_PATH"
          [ -z "${{ secrets.GHCR_DEPLOY_TOKEN }}" ] && missing="$missing GHCR_DEPLOY_TOKEN"
          [ -z "${{ vars.API_DOMAIN }}" ]           && missing="$missing API_DOMAIN(variable)"

          if [ -n "$missing" ]; then
            echo "::error::Deployment is not configured yet — missing:$missing"
            echo "Add these under Settings → Secrets and variables → Actions (secrets vs. the one variable as noted above)."
            echo "See docs/RUNBOOK.md → 'Production deployment' for what each one is and how to obtain it."
            exit 1
          fi
          echo "All required deployment secrets/variables are present."

      - name: Decode SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
          DEPLOY_SHA:        ${{ github.sha }}
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /home/runner/.ssh/deploy_key
          port:     ${{ secrets.VPS_PORT }}
          envs:     GHCR_DEPLOY_TOKEN,DEPLOY_SHA
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_PATH }}"

            if [ ! -f .env.production ]; then
              echo "::error::.env.production is missing at ${{ secrets.VPS_DEPLOY_PATH }} — refusing to deploy without real secrets."
              exit 1
            fi

            git pull origin main
            echo "$GHCR_DEPLOY_TOKEN" | docker login ghcr.io -u peter4tech --password-stdin
            IMAGE_TAG="$DEPLOY_SHA" make deploy
            docker image prune -f

      # The internal docker healthcheck (already enforced by `make deploy`'s
      # `docker compose up --wait`) only proves the container is up — this proves DNS,
      # TLS, and Traefik are actually routing real traffic to it.
      - name: Verify public API endpoint
        run: |
          for i in $(seq 1 10); do
            status=$(curl -s -o /dev/null -w '%{http_code}' "https://${{ vars.API_DOMAIN }}/health" || echo "000")
            if [ "$status" = "200" ]; then
              echo "API is reachable and healthy at https://${{ vars.API_DOMAIN }}/health"
              exit 0
            fi
            echo "Public health check returned $status, retrying ($i/10)..."
            sleep 6
          done
          echo "::error::API did not respond healthy at https://${{ vars.API_DOMAIN }}/health after deploy."
          exit 1
