name: Deploy ClaudyGod

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      
  push:
    branches:
      - main
     

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  CI_DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
  CI_SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
  CI_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.CI_SUPABASE_PUBLISHABLE_KEY }}
  CI_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
  CI_YOUTUBE_API_KEY: ${{ secrets.CI_YOUTUBE_API_KEY }}
  CI_YOUTUBE_CHANNEL_ID: ${{ secrets.CI_YOUTUBE_CHANNEL_ID }}
  CI_POSTFIX_SMTP_USERNAME: ${{ secrets.CI_POSTFIX_SMTP_USERNAME }}
  CI_POSTFIX_SMTP_PASSWORD: ${{ secrets.CI_POSTFIX_SMTP_PASSWORD }}

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        app: [mobile, api, admin-web]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            services/api/package-lock.json
            admin/web/package-lock.json

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn Classic
        run: corepack prepare yarn@1.22.22 --activate

      - name: Create CI environment files
        run: bash ./scripts/setup-ci-env.sh

      - name: Install backend dependencies
        if: matrix.app == 'api'
        run: npm ci --prefix ./services/api

      - name: Install admin dependencies
        if: matrix.app == 'admin-web'
        run: npm ci --prefix ./admin/web

      - name: Install mobile dependencies
        if: matrix.app == 'mobile'
        run: yarn --cwd ./apps/mobile install --frozen-lockfile

      - name: Validate backend build
        if: matrix.app == 'api'
        run: npm --prefix ./services/api run build

      - name: Validate admin build
        if: matrix.app == 'admin-web'
        run: npm --prefix ./admin/web run build

      - name: Lint mobile app
        if: matrix.app == 'mobile'
        run: yarn --cwd ./apps/mobile lint --max-warnings=0

      - name: Typecheck mobile app
        if: matrix.app == 'mobile'
        run: yarn --cwd ./apps/mobile typecheck

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            services/api/package-lock.json
            admin/web/package-lock.json

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn Classic
        run: corepack prepare yarn@1.22.22 --activate

      - name: Create CI environment files
        run: bash ./scripts/setup-ci-env.sh

      - name: Install backend dependencies
        run: npm ci --prefix ./services/api

      - name: Install admin dependencies
        run: npm ci --prefix ./admin/web

      - name: Install mobile dependencies
        run: yarn --cwd ./apps/mobile install --frozen-lockfile

      - name: Run repository review
        run: npm run review:all

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI environment files
        run: bash ./scripts/setup-ci-env.sh

      - name: Render production compose
        run: docker compose --env-file .env.production -f docker-compose.production.yml config >/dev/null

      - name: Build API production image
        run: docker build -t claudygod-api:ci ./services/api

      - name: Build Postfix relay image
        run: docker build -t claudygod-postfix:ci ./ops/postfix

      - name: Build admin web production image
        run: >
          docker build
          --build-arg VITE_API_URL=https://api.example.com
          --build-arg VITE_GOOGLE_LOGIN_URL=https://api.example.com/v1/auth/google/start
          --build-arg VITE_MOBILE_PREVIEW_URL=https://app.example.com
          -t claudygod-admin-web:ci
          ./admin/web

      - name: Build mobile web production image
        run: >
          docker build
          --file ./apps/mobile/Dockerfile.prod
          --build-arg CLAUDYGOD_ENV=production
          --build-arg EXPO_PUBLIC_API_URL=https://api.example.com
          --build-arg EXPO_PUBLIC_SUPABASE_URL=https://gejadzonjvxurxiaxdfj.supabase.co
          --build-arg EXPO_PUBLIC_SUPABASE_KEY=sb_publishable__ci_placeholder_key
          --build-arg EAS_PROJECT_ID=00000000-0000-0000-0000-000000000000
          -t claudygod-mobile-web:ci
          ./apps/mobile
