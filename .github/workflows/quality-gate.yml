name: Quality Gate

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: quality-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true

jobs:
  review-all:
    name: Review All
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            services/api/package-lock.json
            admin/web/package-lock.json

      - name: Enable Corepack
        run: corepack enable

      - name: Activate Yarn Classic
        run: corepack prepare yarn@1.22.22 --activate

      - name: Create CI environment files
        run: bash ./scripts/setup-ci-env.sh

      - name: Install backend dependencies
        run: npm ci --prefix ./services/api

      - name: Install admin dependencies
        run: npm ci --prefix ./admin/web

      - name: Install mobile dependencies
        run: yarn --cwd ./apps/mobile install --frozen-lockfile

      - name: Run full repository review
        run: npm run review:all

  production-docker-dry-run:
    name: Production Docker Dry Run
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - review-all
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI environment files
        run: bash ./scripts/setup-ci-env.sh

      - name: Render production compose
        run: docker compose --env-file .env.production -f docker-compose.production.yml config >/dev/null

      - name: Build API production image
        run: docker build -t claudygod-api:ci ./services/api

      - name: Build Postfix relay image
        run: docker build -t claudygod-postfix:ci ./ops/postfix

      - name: Build admin web production image
        run: >
          docker build
          --build-arg VITE_API_URL=https://api.example.com
          --build-arg VITE_GOOGLE_LOGIN_URL=https://api.example.com/v1/auth/google/start
          --build-arg VITE_MOBILE_PREVIEW_URL=https://app.example.com
          -t claudygod-admin-web:ci
          ./admin/web

      - name: Build mobile web production image
        run: >
          docker build
          --file ./apps/mobile/Dockerfile.prod
          --build-arg CLAUDYGOD_ENV=production
          --build-arg EXPO_PUBLIC_API_URL=https://api.example.com
          --build-arg EXPO_PUBLIC_SUPABASE_URL=https://gejadzonjvxurxiaxdfj.supabase.co
          --build-arg EXPO_PUBLIC_SUPABASE_KEY=sb_publishable__ci_placeholder_key
          --build-arg EXPO_PUBLIC_SUPABASE_ANON_KEY=sb_publishable__ci_placeholder_key
          --build-arg EXPO_PUBLIC_EAS_PROJECT_ID=00000000-0000-0000-0000-000000000000
          -t claudygod-mobile-web:ci
          ./apps/mobile
