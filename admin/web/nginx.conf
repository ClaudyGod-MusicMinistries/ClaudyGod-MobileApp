server {
  listen 80;
  server_name _;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types text/plain text/css text/javascript application/javascript
             application/json application/x-javascript text/xml
             application/xml application/xml+rss image/svg+xml;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  # Never cache the HTML entry point — stale HTML causes ERR_CONNECTION_CLOSED
  # because the browser asks for chunk hashes that no longer exist after a redeploy.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
    add_header Pragma "no-cache" always;
    expires -1;
    try_files $uri =404;
  }

  # Vite hashes every asset filename — these are immutable and safe to cache forever.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
  }

  # Brand / static files — cache for 1 day
  location /brand/ {
    add_header Cache-Control "public, max-age=86400" always;
    try_files $uri =404;
  }

  # SPA fallback — every unknown path serves index.html so the Vue router handles it.
  location / {
    try_files $uri $uri/ /index.html;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Robots-Tag "noindex, nofollow" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}
