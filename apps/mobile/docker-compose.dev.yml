name: claudygod-mobile-dev

services:
  mobile-web:
    profiles: ["web"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: claudygod-mobile-web
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-}
      EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL:-}
      EXPO_PUBLIC_SUPABASE_KEY: ${EXPO_PUBLIC_SUPABASE_KEY:-}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${EXPO_PUBLIC_SUPABASE_ANON_KEY:-}
      EAS_PROJECT_ID: ${EAS_PROJECT_ID:-}
      EXPO_PUBLIC_EAS_PROJECT_ID: ${EXPO_PUBLIC_EAS_PROJECT_ID:-}
      CHOKIDAR_USEPOLLING: "1"
    ports:
      - "19006:19006"
    volumes:
      - ./:/app
      - claudygod_mobile_node_modules:/app/node_modules
    restart: unless-stopped

  mobile-expo:
    profiles: ["native"]
    build:
      context: .
      dockerfile: Dockerfile.expo.dev
    container_name: claudygod-mobile-expo
    command: ["yarn", "start:online", "--", "--host", "lan", "--port", "8081"]
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:-}
      EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL:-}
      EXPO_PUBLIC_SUPABASE_KEY: ${EXPO_PUBLIC_SUPABASE_KEY:-}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${EXPO_PUBLIC_SUPABASE_ANON_KEY:-}
      EAS_PROJECT_ID: ${EAS_PROJECT_ID:-}
      EXPO_PUBLIC_EAS_PROJECT_ID: ${EXPO_PUBLIC_EAS_PROJECT_ID:-}
      EXPO_PACKAGER_HOSTNAME: ${EXPO_PACKAGER_HOSTNAME:-}
      CHOKIDAR_USEPOLLING: "1"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ./:/app
      - claudygod_mobile_node_modules:/app/node_modules
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  claudygod_mobile_node_modules:
