server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  add_header X-Content-Type-Options "nosniff" always;
  add_header Content-Security-Policy "frame-ancestors 'self' https://admin.claudygod.org http://localhost:5173 http://127.0.0.1:5173" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
