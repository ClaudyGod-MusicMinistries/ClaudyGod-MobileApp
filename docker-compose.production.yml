name: claudygod-mobile

# ─── Shared backend environment ──────────────────────────────────────────────
x-backend-env: &backend-env
  NODE_ENV: production
  CLAUDYGOD_ENV: production

  API_PORT: 4000
  API_HOST: 0.0.0.0

  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  DATABASE_SSL: ${DATABASE_SSL:-true}

  REDIS_URL: ${REDIS_URL:?REDIS_URL is required}

  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET is required}
  JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-5m}
  JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}

  BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
  CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required}
  MOBILE_API_KEY: ${MOBILE_API_KEY:?MOBILE_API_KEY is required}
  DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:?DATA_ENCRYPTION_KEY is required}

  AUTH_PUBLIC_BASE_URL: ${AUTH_PUBLIC_BASE_URL:?AUTH_PUBLIC_BASE_URL is required}
  AUTH_VERIFY_EMAIL_PATH: ${AUTH_VERIFY_EMAIL_PATH:-/verify-email}
  AUTH_RESET_PASSWORD_PATH: ${AUTH_RESET_PASSWORD_PATH:-/reset-password}
  AUTH_SIGN_IN_PATH: ${AUTH_SIGN_IN_PATH:-/sign-in}
  AUTH_ACCOUNT_REVIEW_PATH: ${AUTH_ACCOUNT_REVIEW_PATH:-/settings/account}
  AUTH_SESSION_COOKIE_NAME: ${AUTH_SESSION_COOKIE_NAME:-claudygod_session}
  AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-claudygod_refresh_session}
  AUTH_VERIFICATION_TOKEN_TTL_MINUTES: ${AUTH_VERIFICATION_TOKEN_TTL_MINUTES:-1440}
  AUTH_PASSWORD_RESET_TOKEN_TTL_MINUTES: ${AUTH_PASSWORD_RESET_TOKEN_TTL_MINUTES:-30}
  AUTH_REQUIRE_EMAIL_VERIFICATION: ${AUTH_REQUIRE_EMAIL_VERIFICATION:-true}

  SUPABASE_URL: ${SUPABASE_URL:?SUPABASE_URL is required}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}
  SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-mobile-uploads}
  SUPABASE_S3_ENDPOINT: ${SUPABASE_S3_ENDPOINT:?SUPABASE_S3_ENDPOINT is required}
  SUPABASE_S3_REGION: ${SUPABASE_S3_REGION:-eu-west-1}
  SUPABASE_S3_ACCESS_KEY_ID: ${SUPABASE_S3_ACCESS_KEY_ID:?SUPABASE_S3_ACCESS_KEY_ID is required}
  SUPABASE_S3_SECRET_ACCESS_KEY: ${SUPABASE_S3_SECRET_ACCESS_KEY:?SUPABASE_S3_SECRET_ACCESS_KEY is required}

  MAIL_FROM: ${MAIL_FROM:?MAIL_FROM is required}
  MAIL_REPLY_TO: ${MAIL_REPLY_TO:-}
  EMAIL_BRAND_NAME: ${EMAIL_BRAND_NAME:-ClaudyGod}
  EMAIL_SUPPORT_EMAIL: ${EMAIL_SUPPORT_EMAIL:-}
  EMAIL_SUPPORT_URL: ${EMAIL_SUPPORT_URL:-}
  ADMIN_ALERT_EMAILS: ${ADMIN_ALERT_EMAILS:-}

  SMTP_ENABLED: ${SMTP_ENABLED:-true}
  SMTP_PROVIDER: ${SMTP_PROVIDER:-postfix}
  SMTP_PROVIDER_LABEL: ${SMTP_PROVIDER_LABEL:-Brevo via Postfix}
  SMTP_HOST: ${SMTP_HOST:-postfix-relay}
  SMTP_PORT: ${SMTP_PORT:-25}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  POSTFIX_SMTP_USERNAME: ${POSTFIX_SMTP_USERNAME:-}
  POSTFIX_SMTP_PASSWORD: ${POSTFIX_SMTP_PASSWORD:-}
  SMTP_POOL: ${SMTP_POOL:-true}
  SMTP_MAX_CONNECTIONS: ${SMTP_MAX_CONNECTIONS:-5}
  SMTP_MAX_MESSAGES: ${SMTP_MAX_MESSAGES:-200}
  SMTP_CONNECTION_TIMEOUT_MS: ${SMTP_CONNECTION_TIMEOUT_MS:-30000}
  SMTP_GREETING_TIMEOUT_MS: ${SMTP_GREETING_TIMEOUT_MS:-30000}
  SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-false}
  SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}

  YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
  YOUTUBE_CHANNEL_ID: ${YOUTUBE_CHANNEL_ID:-}
  YOUTUBE_MAX_RESULTS: ${YOUTUBE_MAX_RESULTS:-12}

  ADMIN_SIGNUP_CODE: ${ADMIN_SIGNUP_CODE:-}

  METRICS_TOKEN: ${METRICS_TOKEN:?METRICS_TOKEN is required}
  SENTRY_DSN: ${SENTRY_DSN:-}

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── Redis (internal only — never exposed via Traefik) ──────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
    command:
      - sh
      - -c
      - |
        redis-server \
          --appendonly yes \
          --save 60 1000 \
          --requirepass "$${REDIS_PASSWORD}"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    security_opt:
      - no-new-privileges:true
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - internal

  # ── Postfix relay (internal only — never exposed via Traefik) ──────────────
  postfix-relay:
    image: ghcr.io/${GHCR_OWNER:-claudygod-musicministries}/claudygod-postfix:${IMAGE_TAG:-latest}
    build:
      context: ./ops/postfix
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
    security_opt:
      - no-new-privileges:true
    environment:
      POSTFIX_MYHOSTNAME: ${POSTFIX_MYHOSTNAME:?POSTFIX_MYHOSTNAME is required}
      POSTFIX_RELAY_HOST: ${POSTFIX_RELAY_HOST:?POSTFIX_RELAY_HOST is required}
      POSTFIX_RELAY_PORT: ${POSTFIX_RELAY_PORT:-587}
      POSTFIX_SMTP_USERNAME: ${POSTFIX_SMTP_USERNAME:?POSTFIX_SMTP_USERNAME is required}
      POSTFIX_SMTP_PASSWORD: ${POSTFIX_SMTP_PASSWORD:?POSTFIX_SMTP_PASSWORD is required}
    healthcheck:
      test: ["CMD-SHELL", "postfix status >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - internal

  # ── Database migrations (one-shot — never exposed via Traefik) ────────────
  migrate:
    image: ghcr.io/${GHCR_OWNER:-claudygod-musicministries}/claudygod-api:${IMAGE_TAG:-latest}
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: "no"
    init: true
    labels:
      - "traefik.enable=false"
    command: ["node", "dist/db/migrate.js"]
    security_opt:
      - no-new-privileges:true
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      postfix-relay:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - internal

  # ── API (HTTP — exposed via Traefik as cgm-api) ───────────────────────────
  # Service key itself (not just the Traefik router name) is namespaced so its
  # default alias on the shared traefik-public network can't collide with
  # another project's own "api" service (confirmed collision with
  # ClaudyGodweb-Infrastructure's api service — Docker's embedded DNS was
  # non-deterministically round-robining between both containers).
  cgm-api:
    image: ghcr.io/${GHCR_OWNER:-claudygod-musicministries}/claudygod-api:${IMAGE_TAG:-latest}
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      postfix-relay:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.API_PORT || 4000) + '/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - edge
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-traefik-public}"
      # Router
      - "traefik.http.routers.cgm-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.cgm-api.entrypoints=websecure"
      - "traefik.http.routers.cgm-api.tls=true"
      - "traefik.http.routers.cgm-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.cgm-api.middlewares=cgm-api-compress,cgm-api-headers"
      # Middlewares
      - "traefik.http.middlewares.cgm-api-compress.compress=true"
      - "traefik.http.middlewares.cgm-api-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.cgm-api-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.cgm-api-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.cgm-api-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.cgm-api-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()"
      - "traefik.http.middlewares.cgm-api-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.cgm-api-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.cgm-api-headers.headers.stsPreload=true"
      # Service
      - "traefik.http.services.cgm-api.loadbalancer.server.port=4000"

  # ── Background worker (internal only — never exposed via Traefik) ──────────
  worker:
    image: ghcr.io/${GHCR_OWNER:-claudygod-musicministries}/claudygod-api:${IMAGE_TAG:-latest}
    build:
      context: ./services/api
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    init: true
    labels:
      - "traefik.enable=false"
    security_opt:
      - no-new-privileges:true
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      postfix-relay:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      cgm-api:
        condition: service_healthy
    healthcheck:
      disable: true
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - internal

  # ── Prometheus (internal only — never exposed via Traefik; Grafana reads it) ─
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    labels:
      - "traefik.enable=false"
    security_opt:
      - no-new-privileges:true
    environment:
      METRICS_TOKEN: ${METRICS_TOKEN:?METRICS_TOKEN is required}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sed "s|__METRICS_TOKEN__|$${METRICS_TOKEN}|" /etc/prometheus/prometheus.yml.template > /etc/prometheus/prometheus.yml &&
        exec /bin/prometheus --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.path=/prometheus --storage.tsdb.retention.time=30d
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml.template:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9090/-/healthy >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      cgm-api:
        condition: service_healthy
    networks:
      - internal

  # ── Grafana (HTTP — exposed via Traefik as cgm-grafana; has its own login) ──
  # Service key namespaced for the same reason as cgm-api above — both this
  # project and ClaudyGodweb-Infrastructure run a "grafana" service on the
  # shared traefik-public network.
  cgm-grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./ops/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - edge
      - internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-traefik-public}"
      # Router
      - "traefik.http.routers.cgm-grafana.rule=Host(`${GRAFANA_DOMAIN}`)"
      - "traefik.http.routers.cgm-grafana.entrypoints=websecure"
      - "traefik.http.routers.cgm-grafana.tls=true"
      - "traefik.http.routers.cgm-grafana.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.cgm-grafana.middlewares=cgm-grafana-compress,cgm-grafana-headers"
      # Middlewares
      - "traefik.http.middlewares.cgm-grafana-compress.compress=true"
      - "traefik.http.middlewares.cgm-grafana-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.cgm-grafana-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.cgm-grafana-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.cgm-grafana-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.cgm-grafana-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.cgm-grafana-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.cgm-grafana-headers.headers.stsPreload=true"
      # Service
      - "traefik.http.services.cgm-grafana.loadbalancer.server.port=3000"

  # ── Admin web (HTTP — exposed via Traefik as cgm-admin) ───────────────────
  admin-web:
    image: ghcr.io/${GHCR_OWNER:-claudygod-musicministries}/claudygod-admin:${IMAGE_TAG:-latest}
    build:
      context: ./admin/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
        VITE_GOOGLE_LOGIN_URL: ${VITE_GOOGLE_LOGIN_URL:-}
        VITE_MOBILE_PREVIEW_URL: ${VITE_MOBILE_PREVIEW_URL:-}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-traefik-public}"
      # Router
      - "traefik.http.routers.cgm-admin.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.cgm-admin.entrypoints=websecure"
      - "traefik.http.routers.cgm-admin.tls=true"
      - "traefik.http.routers.cgm-admin.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.cgm-admin.middlewares=cgm-admin-compress,cgm-admin-headers"
      # Middlewares
      - "traefik.http.middlewares.cgm-admin-compress.compress=true"
      - "traefik.http.middlewares.cgm-admin-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.cgm-admin-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.cgm-admin-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.cgm-admin-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.cgm-admin-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()"
      - "traefik.http.middlewares.cgm-admin-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.cgm-admin-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.cgm-admin-headers.headers.stsPreload=true"
      # Service
      - "traefik.http.services.cgm-admin.loadbalancer.server.port=80"

  # ── Mobile web app (HTTP — exposed via Traefik as cgm-mobile) ─────────────
  mobile-web:
    image: ghcr.io/${GHCR_OWNER:-claudygod-musicministries}/claudygod-mobile:${IMAGE_TAG:-latest}
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile.prod
      args:
        CLAUDYGOD_ENV: production
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL:?EXPO_PUBLIC_API_URL is required}
        EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL:?EXPO_PUBLIC_SUPABASE_URL is required}
        EXPO_PUBLIC_SUPABASE_KEY: ${EXPO_PUBLIC_SUPABASE_KEY:?EXPO_PUBLIC_SUPABASE_KEY is required}
        EXPO_PUBLIC_MOBILE_API_KEY: ${EXPO_PUBLIC_MOBILE_API_KEY:?EXPO_PUBLIC_MOBILE_API_KEY is required}
        EAS_PROJECT_ID: ${EAS_PROJECT_ID:-}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - edge
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-traefik-public}"
      # Router
      - "traefik.http.routers.cgm-mobile.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.cgm-mobile.entrypoints=websecure"
      - "traefik.http.routers.cgm-mobile.tls=true"
      - "traefik.http.routers.cgm-mobile.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}"
      - "traefik.http.routers.cgm-mobile.middlewares=cgm-mobile-compress,cgm-mobile-headers"
      # Middlewares
      - "traefik.http.middlewares.cgm-mobile-compress.compress=true"
      - "traefik.http.middlewares.cgm-mobile-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.cgm-mobile-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.cgm-mobile-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.cgm-mobile-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()"
      - "traefik.http.middlewares.cgm-mobile-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.cgm-mobile-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.cgm-mobile-headers.headers.stsPreload=true"
      # Service
      - "traefik.http.services.cgm-mobile.loadbalancer.server.port=80"

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  redis_data:
  prometheus_data:
  grafana_data:

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  edge:
    external: true
    name: ${TRAEFIK_PUBLIC_NETWORK:-traefik-public}
  internal:
    driver: bridge
