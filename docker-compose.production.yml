name: claudygod-production

x-backend-env: &backend-env
  NODE_ENV: production
  CLAUDYGOD_ENV: production
  API_PORT: 4000
  API_HOST: 0.0.0.0
  DATABASE_URL: ${DATABASE_URL}
  DATABASE_SSL: ${DATABASE_SSL:-true}
  REDIS_URL: redis://redis:6379
  JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-1d}
  BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
  CORS_ORIGIN: ${CORS_ORIGIN}
  MOBILE_API_KEY: ${MOBILE_API_KEY}
  AUTH_PUBLIC_BASE_URL: ${AUTH_PUBLIC_BASE_URL}
  AUTH_VERIFY_EMAIL_PATH: ${AUTH_VERIFY_EMAIL_PATH:-/verify-email}
  AUTH_RESET_PASSWORD_PATH: ${AUTH_RESET_PASSWORD_PATH:-/reset-password}
  AUTH_SIGN_IN_PATH: ${AUTH_SIGN_IN_PATH:-/sign-in}
  AUTH_ACCOUNT_REVIEW_PATH: ${AUTH_ACCOUNT_REVIEW_PATH:-/settings/account}
  AUTH_VERIFICATION_TOKEN_TTL_MINUTES: ${AUTH_VERIFICATION_TOKEN_TTL_MINUTES:-1440}
  AUTH_PASSWORD_RESET_TOKEN_TTL_MINUTES: ${AUTH_PASSWORD_RESET_TOKEN_TTL_MINUTES:-30}
  AUTH_REQUIRE_EMAIL_VERIFICATION: ${AUTH_REQUIRE_EMAIL_VERIFICATION:-true}
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
  SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-mobile-uploads}
  MAIL_FROM: ${MAIL_FROM}
  MAIL_REPLY_TO: ${MAIL_REPLY_TO}
  EMAIL_BRAND_NAME: ${EMAIL_BRAND_NAME:-ClaudyGod}
  EMAIL_SUPPORT_EMAIL: ${EMAIL_SUPPORT_EMAIL:-}
  EMAIL_SUPPORT_URL: ${EMAIL_SUPPORT_URL:-}
  ADMIN_ALERT_EMAILS: ${ADMIN_ALERT_EMAILS:-}
  SMTP_PROVIDER: ${SMTP_PROVIDER:-postfix}
  SMTP_HOST: ${SMTP_HOST:-postfix-relay}
  SMTP_PORT: ${SMTP_PORT:-25}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_USER: ${SMTP_USER:-}
  SMTP_PASS: ${SMTP_PASS:-}
  SMTP_POOL: ${SMTP_POOL:-true}
  SMTP_MAX_CONNECTIONS: ${SMTP_MAX_CONNECTIONS:-5}
  SMTP_MAX_MESSAGES: ${SMTP_MAX_MESSAGES:-200}
  SMTP_CONNECTION_TIMEOUT_MS: ${SMTP_CONNECTION_TIMEOUT_MS:-30000}
  SMTP_GREETING_TIMEOUT_MS: ${SMTP_GREETING_TIMEOUT_MS:-30000}
  SMTP_REQUIRE_TLS: ${SMTP_REQUIRE_TLS:-false}
  SMTP_TLS_REJECT_UNAUTHORIZED: ${SMTP_TLS_REJECT_UNAUTHORIZED:-true}
  YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
  YOUTUBE_CHANNEL_ID: ${YOUTUBE_CHANNEL_ID:-}
  YOUTUBE_MAX_RESULTS: ${YOUTUBE_MAX_RESULTS:-12}
  ADMIN_SIGNUP_CODE: ${ADMIN_SIGNUP_CODE:-}
  SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL}
  SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
  SEED_ADMIN_DISPLAY_NAME: ${SEED_ADMIN_DISPLAY_NAME:-Claudy Admin}
  SEED_ADMIN_ON_BOOT: ${SEED_ADMIN_ON_BOOT:-false}

services:
  traefik:
    image: traefik:v3.6
    container_name: claudygod-production-traefik-1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      DOCKER_API_VERSION: "1.44"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ops/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - traefik_letsencrypt:/letsencrypt
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - edge

  redis:
    image: redis:7-alpine
    container_name: claudygod-production-redis-1
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    security_opt:
      - no-new-privileges:true
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  postfix-relay:
    build:
      context: ./ops/postfix
    container_name: claudygod-production-postfix-relay-1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      POSTFIX_MYHOSTNAME: ${POSTFIX_MYHOSTNAME}
      POSTFIX_RELAY_HOST: ${POSTFIX_RELAY_HOST}
      POSTFIX_RELAY_PORT: ${POSTFIX_RELAY_PORT:-587}
      POSTFIX_SMTP_USERNAME: ${POSTFIX_SMTP_USERNAME}
      POSTFIX_SMTP_PASSWORD: ${POSTFIX_SMTP_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "postfix status >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - internal

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: claudygod-production-api-1
    restart: unless-stopped
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      postfix-relay:
        condition: service_started
    expose:
      - "4000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.API_PORT || 4000) + '/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - edge
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-traefik-public}
      - traefik.http.routers.api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls=true
      - traefik.http.routers.api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.api.middlewares=api-compress,api-headers
      - traefik.http.middlewares.api-compress.compress=true
      - traefik.http.middlewares.api-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.api-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.api-headers.headers.frameDeny=true
      - traefik.http.middlewares.api-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.api-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()
      - traefik.http.middlewares.api-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.api-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.api-headers.headers.stsPreload=true
      - traefik.http.services.api.loadbalancer.server.port=4000

  worker:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: claudygod-production-worker-1
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    init: true
    security_opt:
      - no-new-privileges:true
    environment:
      <<: *backend-env
    depends_on:
      redis:
        condition: service_healthy
      postfix-relay:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - internal

  admin-web:
    build:
      context: ./admin/web
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_GOOGLE_LOGIN_URL: ${VITE_GOOGLE_LOGIN_URL:-}
        VITE_MOBILE_PREVIEW_URL: ${VITE_MOBILE_PREVIEW_URL:-}
    container_name: claudygod-production-admin-web-1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-traefik-public}
      - traefik.http.routers.admin.rule=Host(`${ADMIN_DOMAIN}`)
      - traefik.http.routers.admin.entrypoints=websecure
      - traefik.http.routers.admin.tls=true
      - traefik.http.routers.admin.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.admin.middlewares=admin-compress,admin-headers
      - traefik.http.middlewares.admin-compress.compress=true
      - traefik.http.middlewares.admin-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.admin-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.admin-headers.headers.frameDeny=true
      - traefik.http.middlewares.admin-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.admin-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()
      - traefik.http.middlewares.admin-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.admin-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.admin-headers.headers.stsPreload=true
      - traefik.http.services.admin.loadbalancer.server.port=80

  mobile-web:
    build:
      context: ./apps/mobile
      dockerfile: Dockerfile.prod
      args:
        CLAUDYGOD_ENV: production
        EXPO_PUBLIC_API_URL: ${EXPO_PUBLIC_API_URL}
        EXPO_PUBLIC_SUPABASE_URL: ${EXPO_PUBLIC_SUPABASE_URL}
        EXPO_PUBLIC_SUPABASE_KEY: ${EXPO_PUBLIC_SUPABASE_KEY}
        EAS_PROJECT_ID: ${EAS_PROJECT_ID:-}
    container_name: claudygod-production-mobile-web-1
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK:-traefik-public}
      - traefik.http.routers.mobile.rule=Host(`${APP_DOMAIN}`)
      - traefik.http.routers.mobile.entrypoints=websecure
      - traefik.http.routers.mobile.tls=true
      - traefik.http.routers.mobile.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.mobile.middlewares=mobile-compress,mobile-headers
      - traefik.http.middlewares.mobile-compress.compress=true
      - traefik.http.middlewares.mobile-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.mobile-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.mobile-headers.headers.frameDeny=true
      - traefik.http.middlewares.mobile-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.mobile-headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()
      - traefik.http.middlewares.mobile-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.mobile-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.mobile-headers.headers.stsPreload=true
      - traefik.http.services.mobile.loadbalancer.server.port=80

volumes:
  redis_data:
  traefik_letsencrypt:

networks:
  edge:
    external: true
    name: ${TRAEFIK_PUBLIC_NETWORK:-traefik-public}
  internal:
    internal: true
