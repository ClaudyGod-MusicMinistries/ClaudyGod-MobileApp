http:
  middlewares:
    compress-response:
      compress: {}
    security-headers:
      headers:
        frameDeny: true
        browserXssFilter: true
        contentTypeNosniff: true
        referrerPolicy: strict-origin-when-cross-origin
        permissionsPolicy: "camera=(), microphone=(), geolocation=()"
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true
    security-chain:
      chain:
        middlewares:
          - compress-response
          - security-headers
